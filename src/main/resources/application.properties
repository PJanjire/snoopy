spring.application.name=snoopy

spring.datasource.url=jdbc:mysql://localhost:3306/snoopy
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.web.resources.static-locations=classpath:/static/,classpath:/public/
spring.mvc.static-path-pattern=/**

spring.mvc.log-resolved-exception=false
logging.level.org.springframework.web.servlet.resource.NoResourceFoundException=OFF
server.port=9090

# JWT
jwt.secret=your_very_long_256_bit_secresdgnfhgt_key_that_is_at_least_32_characters
jwt.expiration=86400000