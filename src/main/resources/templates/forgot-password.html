<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
	content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Snoopy</title>
<meta name="author" content="Squadlogic" />

<!-- Favicon -->
<link rel="shortcut icon" href="../img/favicon.ico">
<link rel="icon" href="../img/favicon.ico" type="image/x-icon">
<!-- vector map CSS -->
<link
	href="bower_components/jasny-bootstrap/dist/css/jasny-bootstrap.min.css"
	rel="stylesheet" type="text/css" />

<link
	href="/bower_components/jquery-toast-plugin/dist/jquery.toast.min.css"
	rel="stylesheet" type="text/css">

<!-- Custom CSS -->
<link href="dist/css/style.css" rel="stylesheet" type="text/css">
</head>
<body>
	<!--Preloader-->
	<div class="preloader-it">
		<div class="la-anim-1"></div>
	</div>
	<!--/Preloader-->

	<div class="wrapper  pa-0">
		<!-- Main Content -->
		<div class="page-wrapper pa-0 ma-0 auth-page">
			<div class="container-fluid">
				<!-- Row -->
				<div class="table-struct full-width full-height">
					<div class="table-cell vertical-align-middle auth-form-wrap">
						<div class="auth-form  ml-auto mr-auto no-float">
							<div class="row">
								<div class="col-sm-12 col-xs-12">
									<div class="sp-logo-wrap text-center pa-0 mb-30">
										<a href="dasboard.htm"> <img class="brand-img mr-10"
											src="../img/logo.png" alt="brand" /> <span class="brand-text">Snoopy</span>
										</a>
									</div>
									<div class="mb-30">
										<h3 class="text-center txt-dark mb-10">Need help with
											your password?</h3>
										<h6 class="text-center txt-grey nonecase-font">Enter the
											email you use for Snoopy, and we’ll help you create a new
											password.</h6>
									</div>
									<div class="form-wrap">
										<form action="#">
											<div class="form-group">
												<label class="control-label mb-10" for="exampleInputEmail_2">Email
													address</label> <input type="email" class="form-control"
													required="" id="exampleInputEmail_2"
													placeholder="Enter email">
											</div>

											<div class="form-group text-center">
												<button type="submit" class="btn btn-warning btn-rounded">Reset</button>
											</div>
										</form>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>
				<!-- /Row -->
			</div>
			<div th:replace="~{footer :: footer}"></div>

		</div>
		<!-- /Main Content -->
	</div>
	<!-- /#wrapper -->

	<!-- JavaScript -->
	<!-- JavaScript -->
	<div th:replace="scripts :: scripts">...</div>
</body>
