<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
	content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Snoopy</title>
<meta name="author" content="Squadlogic" />

<!-- Favicon -->
<link rel="shortcut icon" href="../img/favicon.ico">
<link rel="icon" href="../img/favicon.ico" type="image/x-icon">

<!-- vector map CSS -->
<link
	href="/bower_components/jasny-bootstrap/dist/css/jasny-bootstrap.min.css"
	rel="stylesheet" type="text/css" />



<!-- Custom CSS -->
<link href="/dist/css/style.css" rel="stylesheet" type="text/css">
</head>
<body>
	<!--Preloader-->
	<div class="preloader-it">
		<div class="la-anim-1"></div>
	</div>
	<!--/Preloader-->

	<div class="wrapper  error-page pa-0">
		<header class="sp-header">
			<div class="sp-logo-wrap pull-left">
				<a href="login.htm"> <img class="brand-img mr-10"
					src="../img/logo.png" alt="brand" /> <span class="brand-text">Snoopy</span>
				</a>
			</div>

			<div class="clearfix"></div>
		</header>

		<!-- Main Content -->
		<div class="page-wrapper pa-0 ma-0 error-bg-img">
			<div class="container-fluid">
				<!-- Row -->
				<div class="table-struct full-width full-height">
					<div class="table-cell vertical-align-middle auth-form-wrap">
						<div class="auth-form  ml-auto mr-auto no-float">
							<div class="row">
								<div class="col-sm-12 col-xs-12">
									<div class="mb-30">
										<span class="block error-head text-center txt-orange mb-10">400</span>
										<span
											class="text-center nonecase-font mb-20 block error-comment">Bad
											Request</span>
										<p class="text-center">The request could not be understood
											by the server. Please check your input and try again.</p>
										<div class="text-center">
											<a
												class="btn btn-warning btn-rounded btn-outline nonecase-font mt-10"
												href="login.htm">Back to Home</a>
										</div>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>
				<!-- /Row -->
			</div>

		</div>
		<!-- /Main Content -->

	</div>
	<!-- /#wrapper -->

	<!-- JavaScript -->

	<!-- jQuery -->
	<div th:replace="~{scripts :: scripts}"></div>
</body>
</html>
