<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
	content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Snoopy</title>
<meta name="author" content="Squadlogic" />

<!-- Favicon -->
<link rel="shortcut icon" href="../img/favicon.ico">
<link rel="icon" href="../img/favicon.ico" type="image/x-icon">
<!-- Morris Charts CSS -->
<link href="bower_components/morris.js/morris.css" rel="stylesheet"
	type="text/css" />


<!-- Calendar CSS -->
<link href="bower_components/fullcalendar/dist/fullcalendar.css"
	rel="stylesheet" type="text/css" />

<!-- Data table CSS -->
<link
	href="bower_components/datatables/media/css/jquery.dataTables.min.css"
	rel="stylesheet" type="text/css" />


<!-- Custom CSS -->
<link href="dist/css/style.css" rel="stylesheet" type="text/css">
</head>

<body>
	<!--Preloader-->
	<div class="preloader-it">
		<div class="la-anim-1"></div>
	</div>
	<!--/Preloader-->
	<div class="wrapper  theme-1-active pimary-color-blue">

		<!-- Top Menu Items -->
		<div th:replace="~{header :: header}"></div>
		<!-- /Top Menu Items -->

		<!-- Left Sidebar Menu -->
		<div th:replace="~{leftnavbar :: leftnavbar}"></div>
		<!-- /Left Sidebar Menu -->

		<!-- Right Sidebar Backdrop -->
		<div class="right-sidebar-backdrop"></div>
		<!-- /Right Sidebar Backdrop -->

		<!-- Main Content -->
		<div class="page-wrapper">
			<div class="container-fluid pt-30">

				<!-- Row -->
				<div class="row justify-content-center">
					<div class="col-12  col-md-8 col-lg-6">
						<div class="panel panel-default card-view  pa-0 w-100">
							<div class="panel-wrapper collapse in">
								<div class="panel-body  pa-0">
									<div class="profile-box">
										<div class="profile-cover-pic">
											<div class="fileupload btn btn-default">
												<span class="btn-text">edit</span> <input class="upload"
													type="file">
											</div>
											<div class="profile-image-overlay"></div>
										</div>
										<div class="profile-info text-center">
											<div class="profile-img-wrap">
												<img class="inline-block mb-10" src="../img/mock1.jpg"
													alt="user" />
												<div class="fileupload btn btn-default">
													<span class="btn-text">edit</span> <input class="upload"
														type="file">
												</div>
											</div>
											<h5
												class="block mt-10 mb-5 weight-500 capitalize-font txt-orange"
												th:text="${#authentication.name}">User</h5>
											<h6 class="block capitalize-font pb-20">Developer Geek</h6>
										</div>
										<div class="social-info">
											<div class="row">
												<div class="col-xs-4 text-center">
													<span class="counts block head-font"><span
														class="counter-anim">345</span></span> <span
														class="counts-text block">post</span>
												</div>
												<div class="col-xs-4 text-center">
													<span class="counts block head-font"><span
														class="counter-anim">246</span></span> <span
														class="counts-text block">followers</span>
												</div>
												<div class="col-xs-4 text-center">
													<span class="counts block head-font"><span
														class="counter-anim">898</span></span> <span
														class="counts-text block">tweets</span>
												</div>
											</div>
											<button class="btn btn-warning btn-block  btn-anim mt-30"
												data-bs-toggle="modal" data-bs-target="#myModal">
												<i class="fa fa-pencil"></i><span class="btn-text">edit
													profile</span>
											</button>
											<div id="myModal" class="modal fade in" tabindex="-1"
												role="dialog" aria-labelledby="myModalLabel"
												aria-hidden="true">
												<div class="modal-dialog">
													<div class="modal-content">
														<div class="modal-header">
															<button type="button" class="close"
																data-bs-dismiss="modal" aria-hidden="true">×</button>
															<h5 class="modal-title" id="myModalLabel">Edit
																Profile</h5>
														</div>
														<div class="modal-body">
															<!-- Row -->
															<div class="row">
																<div class="col-lg-12">
																	<div class="">
																		<div class="panel-wrapper collapse in">
																			<div class="panel-body pa-0">
																				<div class="col-sm-12 col-12">
																					<div class="form-wrap">
																						<form action="#">
																							<div class="form-body overflow-hide">
																								<div class="form-group">
																									<label class="control-label mb-10"
																										for="exampleInputuname_1">Name</label>
																									<div class="input-group">
																										<div class="input-group-addon">
																											<i class="icon-user"></i>
																										</div>
																										<input type="text" class="form-control"
																											id="exampleInputuname_1"
																											placeholder="willard bryant">
																									</div>
																								</div>
																								<div class="form-group">
																									<label class="control-label mb-10"
																										for="exampleInputEmail_1">Email
																										address</label>
																									<div class="input-group">
																										<div class="input-group-addon">
																											<i class="icon-envelope-open"></i>
																										</div>
																										<input type="email" class="form-control"
																											id="exampleInputEmail_1"
																											placeholder="xyz@gmail.com">
																									</div>
																								</div>
																								<div class="form-group">
																									<label class="control-label mb-10"
																										for="exampleInputContact_1">Contact
																										number</label>
																									<div class="input-group">
																										<div class="input-group-addon">
																											<i class="icon-phone"></i>
																										</div>
																										<input type="email" class="form-control"
																											id="exampleInputContact_1"
																											placeholder="+102 9388333">
																									</div>
																								</div>
																								<div class="form-group">
																									<label class="control-label mb-10"
																										for="exampleInputpwd_1">Password</label>
																									<div class="input-group">
																										<div class="input-group-addon">
																											<i class="icon-lock"></i>
																										</div>
																										<input type="password" class="form-control"
																											id="exampleInputpwd_1"
																											placeholder="Enter pwd" value="password">
																									</div>
																								</div>
																								<div class="form-group">
																									<label class="control-label mb-10">Gender</label>
																									<div>
																										<div class="radio">
																											<input type="radio" name="radio1"
																												id="radio_1" value="option1" checked="">
																											<label for="radio_1"> M </label>
																										</div>
																										<div class="radio">
																											<input type="radio" name="radio1"
																												id="radio_2" value="option2"> <label
																												for="radio_2"> F </label>
																										</div>
																									</div>
																								</div>
																								<div class="form-group">
																									<label class="control-label mb-10">Country</label>
																									<select class="form-control"
																										data-placeholder="Choose a Category"
																										tabindex="1">
																										<option value="Category 1">USA</option>
																										<option value="Category 2">Austrailia</option>
																										<option value="Category 3">India</option>
																										<option value="Category 4">UK</option>
																									</select>
																								</div>
																							</div>
																							<div class="form-actions mt-10">
																								<button type="submit"
																									class="btn btn-success mr-10 mb-30">Update
																									profile</button>
																							</div>
																						</form>
																					</div>
																				</div>
																			</div>
																		</div>
																	</div>
																</div>
															</div>
														</div>
														<div class="modal-footer">
															<button type="button"
																class="btn btn-success waves-effect"
																data-bs-dismiss="modal">Save</button>
															<button type="button"
																class="btn btn-default waves-effect"
																data-bs-dismiss="modal">Cancel</button>
														</div>
													</div>
													<!-- /.modal-content -->
												</div>
												<!-- /.modal-dialog -->
											</div>
										</div>
									</div>
								</div>
							</div>
						</div>
					</div>

				</div>
				<!-- Footer -->
				<div th:replace="~{footer :: footer}"></div>

				<!-- /Footer -->

			</div>
			<!-- /Main Content -->

		</div>
		<!-- /#wrapper -->

		<!-- JavaScript -->

		<!-- jQuery -->
		<div th:replace="~{scripts :: scripts}"></div>
</body>

</html>
